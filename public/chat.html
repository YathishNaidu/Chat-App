<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<style>
body{
  margin:0;
  display:flex;
  height:100vh;
  font-family:sans-serif;
}

#users{
  width:25%;
  background:#0f172a;
  color:white;
  padding:10px;
  overflow:auto;
}

#chat{
  width:75%;
  display:flex;
  flex-direction:column;
}

#messages{
  flex:1;
  overflow:auto;
  background:#e2e8f0;
  padding:10px;
}

#input{
  display:flex;
}

input{
  flex:1;
  padding:10px;
}

button{
  padding:10px;
  border:none;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.user{
  padding:10px;
  border-bottom:1px solid #333;
  cursor:pointer;
}

img{
  max-width:150px;
  margin-top:5px;
}

video{
  width:200px;
}
</style>
</head>

<body>

<!-- USERS -->
<div id="users"></div>

<!-- CHAT -->
<div id="chat">

  <div id="messages"></div>

  <div id="input">
    <input id="msg" placeholder="Type message...">
    <input type="file" id="file">
    <button onclick="send()">Send</button>
    <button onclick="startCall()">📞</button>
  </div>

  <video id="localVideo" autoplay muted></video>
  <video id="remoteVideo" autoplay></video>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

// ===== USER =====
const phone = localStorage.getItem("phone");

if(!phone){
  alert("Login first");
  window.location = "index.html";
}

// DEFAULT CHAT
let current = "group";

socket.emit('join', phone);

// ===== NOTIFICATION =====
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

// ===== LOAD USERS =====
async function loadUsers(){
  const res = await fetch('/users');
  const users = await res.json();

  let html = `<div class="user" onclick="selectUser('group')">🌐 Group</div>`;

  users.forEach(u=>{
    if(u.phone !== phone){
      html += `<div class="user" onclick="selectUser('${u.phone}')">${u.name}</div>`;
    }
  });

  document.getElementById("users").innerHTML = html;
}

// ===== SELECT USER =====
async function selectUser(target){
  current = target;

  const res = await fetch(`/messages/${phone}/${target}`);
  const msgs = await res.json();

  let html = "";

  msgs.forEach(m=>{
    if(m.image){
      html += `<div><b>${m.sender}</b>:<br><img src="${m.image}"></div>`;
    }else{
      html += `<div><b>${m.sender}</b>: ${m.text || ""}</div>`;
    }
  });

  document.getElementById("messages").innerHTML = html;
}

// ===== SEND MESSAGE =====
async function send(){
  const text = document.getElementById("msg").value.trim();
  const file = document.getElementById("file").files[0];

  if(!text && !file){
    alert("Enter message or select file");
    return;
  }

  // IMAGE SEND
  if(file){
    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch('/upload',{
      method:'POST',
      body:formData
    });

    const data = await res.json();

    socket.emit('send',{
      sender:phone,
      receiver:current,
      image:"/uploads/"+data.file
    });

  }else{
    socket.emit('send',{
      sender:phone,
      receiver:current,
      text:text
    });
  }

  document.getElementById("msg").value="";
  document.getElementById("file").value="";
}

// ===== RECEIVE =====
socket.on('receive', msg => {

  // SHOW ONLY CURRENT CHAT
  if(msg.receiver === current || 
     (current !== "group" && msg.sender === current && msg.receiver === phone) ||
     (current === "group" && msg.receiver === "group")){

    let html = "";

    if(msg.image){
      html = `<div><b>${msg.sender}</b>:<br><img src="${msg.image}"></div>`;
    }else{
      html = `<div><b>${msg.sender}</b>: ${msg.text || ""}</div>`;
    }

    document.getElementById("messages").innerHTML += html;

    // AUTO SCROLL
    const box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;

    // NOTIFICATION
    if(msg.sender !== phone){
      new Notification("New Message", {
        body: msg.text || "Image received"
      });
    }
  }

});

// ===== VIDEO CALL =====
let pc = new RTCPeerConnection();

navigator.mediaDevices.getUserMedia({video:true,audio:true})
.then(stream=>{
  document.getElementById("localVideo").srcObject = stream;
  stream.getTracks().forEach(track=>pc.addTrack(track,stream));
});

pc.ontrack = e=>{
  document.getElementById("remoteVideo").srcObject = e.streams[0];
};

function startCall(){
  pc.createOffer().then(offer=>{
    pc.setLocalDescription(offer);
    socket.emit('offer', offer);
  });
}

socket.on('offer', async offer=>{
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('answer', answer);
});

socket.on('answer', ans=>{
  pc.setRemoteDescription(ans);
});

pc.onicecandidate = e=>{
  if(e.candidate){
    socket.emit('ice-candidate', e.candidate);
  }
};

socket.on('ice-candidate', c=>{
  pc.addIceCandidate(c);
});

// ===== INIT =====
loadUsers();
selectUser("group");

</script>

</body>
</html>
